<!--
  ════════════════════════════════════════════════════════════
  VitaLily Logo — Integration Snippet for index.html
  ════════════════════════════════════════════════════════════

  STEP 1 — Add Google Font in <head> (before existing fonts,
            or append to the existing font <link>):

  Change the existing font link from:
    family=Noto+Sans+TC:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600

  To:
    family=Cormorant+Garamond:wght@400;500;600&family=Noto+Sans+TC:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600


  STEP 2 — Add <link> to logo CSS in <head>:
  <link rel="stylesheet" href="logo/vitalily-logo.css">


  STEP 3 — Replace the .login-aside inner HTML.

  CURRENT (index.html line ~802):
  ─────────────────────────────────────────────────────────────
  <div class="login-aside">
    <div class="login-brand">
      <h1>機構健康<br>資料看板</h1>
      <small>Healthcare Dashboard v3.0</small>
    </div>
  </div>

  REPLACE WITH:
  ─────────────────────────────────────────────────────────────
-->

<!-- ── Paste this block into .login-aside ── -->
<div class="login-aside">

  <!-- VitaLily Logo — large, dark-bg context -->
  <div class="logo logo-large" role="img" aria-label="VitaLily 機構健康資料看板">
    <div class="logo__icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none"
           stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
           stroke-linejoin="round" aria-hidden="true" focusable="false">
        <ellipse cx="20" cy="13.2" rx="2.0" ry="6.8"
                 fill="currentColor" fill-opacity="0.10"
                 transform="rotate(0 20 20)"/>
        <ellipse cx="20" cy="13.2" rx="2.0" ry="6.8"
                 fill="currentColor" fill-opacity="0.10"
                 transform="rotate(60 20 20)"/>
        <ellipse cx="20" cy="13.2" rx="2.0" ry="6.8"
                 fill="currentColor" fill-opacity="0.10"
                 transform="rotate(120 20 20)"/>
        <ellipse cx="20" cy="13.2" rx="2.0" ry="6.8"
                 fill="currentColor" fill-opacity="0.10"
                 transform="rotate(180 20 20)"/>
        <ellipse cx="20" cy="13.2" rx="2.0" ry="6.8"
                 fill="currentColor" fill-opacity="0.10"
                 transform="rotate(240 20 20)"/>
        <ellipse cx="20" cy="13.2" rx="2.0" ry="6.8"
                 fill="currentColor" fill-opacity="0.10"
                 transform="rotate(300 20 20)"/>
        <circle cx="20" cy="20" r="2.2"
                fill="currentColor" fill-opacity="0.55" stroke="none"/>
        <circle cx="20" cy="20" r="3.6"
                fill="none" stroke="currentColor"
                stroke-opacity="0.35" stroke-width="0.9"/>
      </svg>
    </div>
    <div class="logo__text">
      <span class="logo__wordmark">VitaLily</span>
      <span class="logo__subtitle">Healthcare Dashboard</span>
    </div>
  </div>

  <!-- Existing .login-deco flower emoji (keep or remove) -->
  <!-- <div class="login-deco">🌿</div> -->

  <!-- Version caption — bottom of aside, retain original style -->
  <small style="font-size:10px; color:rgba(255,255,255,0.38); letter-spacing:.5px; text-transform:uppercase;">
    v3.0
  </small>

</div>
<!-- ── End login-aside ── -->
